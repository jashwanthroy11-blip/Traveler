<!-- Background Atmospheric Effect -->
<div class="fixed top-0 right-0 -z-10 w-[600px] h-[600px] bg-primary-container/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[400px] h-[400px] bg-secondary-container/20 blur-[100px] rounded-full pointer-events-none"></div>
<script>
        // Micro-interactions
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.classList.add('opacity-70');
            });
            btn.addEventListener('touchend', function() {
                this.classList.remove('opacity-70');
            });
        });

        // Units selection toggle
        const unitsBtn = document.getElementById('units-btn');
        const unitsLabel = document.getElementById('units-label');
        if (unitsBtn && unitsLabel) {
            let currentUnits = localStorage.getItem('traveler_units') || 'Kilometers (km)';
            unitsLabel.textContent = currentUnits;
            unitsBtn.addEventListener('click', () => {
                currentUnits = currentUnits.includes('Kilometers') ? 'Miles (mi)' : 'Kilometers (km)';
                localStorage.setItem('traveler_units', currentUnits);
                unitsLabel.textContent = currentUnits;
                
                // Add a small animation to units icon
                const icon = unitsBtn.querySelector('.material-symbols-outlined');
                icon.style.transform = 'scale(1.2) rotate(15deg)';
                setTimeout(() => {
                    icon.style.transform = 'none';
                }, 200);
            });
        }

        // Simple Logout Simulation
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                logoutBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> <span class="font-body-lg text-body-lg font-semibold">Logging out...</span>';
                setTimeout(() => {
                    alert('You have been safely logged out of Airy Adventure.');
                    location.href = 'index.html';
                }, 1500);
            });
        }
    </script>
